global
    log /dev/log local0
    daemon

defaults
    log global
    mode http
    option httplog
    timeout connect 5000
    timeout client  50000
    timeout server  50000
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

listen stats  # веб-страница со статистикой
    bind                    :888
    mode                    http
    stats                   enable
    stats uri               /stats
    stats refresh           5s
    stats realm             Haproxy\ Statistics

frontend example
    bind :8088
    mode http

    acl host_example hdr(host) -i example.local

    use_backend web_servers if host_example

    default_backend deny_all

backend web_servers
    mode http
    balance roundrobin

    server s1 127.0.0.1:7777 weight 2 check
    server s2 127.0.0.1:8888 weight 3 check
    server s3 127.0.0.1:9999 weight 4 check

backend deny_all
    mode http
    http-request deny deny_status 403
